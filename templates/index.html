<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="container py-4">
    <div class="modal" tabindex="-1" id="modalDatos">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Datos de Formulario</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <p>¿Quieres que tus datos sean guardados y protegidos?</p>
          </div>
<div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            <button type="button" class="btn btn-primary">Guardar Datos</button>
          </div>
        </div>
      </div>
    </div>
    <h1 class="fw-bold">¡Inicio de Sesión!</h1>

    <form action="/login" method="post">
      <div class="mb-3">
        <label for="email" class="form-label fw-bold fs-4">Email</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="EMAIL">
        <div class="p-2 fw-bold">Sus datos están 100% protegidos.</div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label fw-bold fs-4">Contraseña</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="(CONTRASEÑA)">
      </div>
      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary fw-bold">Iniciar Sesión</button>
        <a href="/registro" class="btn btn-link fw-bold">¿Aún no tienes cuenta?</a>
      </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

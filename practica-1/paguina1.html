nav {
  position: relative;
  width: 520px;
  height: 50px;
  background: rgba(255, 255, 255, 0.512);
  border-radius: 8px;
  display: flex;
  align-items: center;
  overflow: hidden;

}

nav a {
  position: relative;
  width: 130px;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 1em;
  font-weight: 500;
  color: #000000;
  text-decoration: none;
  z-index: 1;
}

nav span {
  position: absolute;
  left: 0;
  top: 0;
  width: 130px;
  height: 100%;
  background: rgba(43, 62, 165, 0.671);
  border-radius: 8px;
  transition: 0.5s;
}

nav a:nth-child(1):hover ~ span {
  left: 0;
}

nav a:nth-child(2):hover ~ span {
  left: 130px;
}

nav a:nth-child(3):hover ~ span {
  left: 260px;
}

nav a:nth-child(4):hover ~ span {
  left: 390px;
}
